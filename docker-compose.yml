services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: monitors
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitors"]
      interval: 5s
      timeout: 3s
      retries: 20

  alert-hub:
    build:
      context: .
      dockerfile: apps/alert-hub/Dockerfile
    environment:
      ALERT_HUB_HOST: 0.0.0.0
      ALERT_HUB_PORT: 18280
      ALERT_HUB_RING_SIZE: 500
      ALERT_HUB_NATS_ENABLED: "true"
      ALERT_HUB_NATS_SUBJECT: alerts.>
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started
    ports:
      - "18280:18280"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18280/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 12

  news-feed:
    build:
      context: .
      dockerfile: apps/news-feed/Dockerfile
    environment:
      CONTROL_PORT: 18380
      ALERT_HUB_URL: http://alert-hub:18280
      WATCH_COINS: 
      BWE_NEWS_ENABLED: "true"
      BWE_NEWS_WS_URL: wss://bwenews-api.bwe-ws.com/ws
      BWE_NEWS_HTTP_URL: https://rss-public.bwe-ws.com/
      BWE_NEWS_HTTP_FALLBACK_ENABLED: "true"
      BWE_NEWS_HTTP_POLL_MS: 15000
      BWE_NEWS_WS_STALE_MS: 45000
    depends_on:
      alert-hub:
        condition: service_healthy
    ports:
      - "18380:18380"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18380/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 12

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NATS_URL: nats://nats:4222
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/monitors
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      alert-hub:
        condition: service_healthy
    ports:
      - "18081:18081"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18081/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  pg_data:
