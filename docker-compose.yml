services:
  nats:
    image: nats:2.10-alpine
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: monitors
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitors"]
      interval: 5s
      timeout: 3s
      retries: 20

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NATS_URL: nats://nats:4222
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/monitors
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "18081:18081"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18081/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 12

  arb-engine:
    build:
      context: ./apps/arb-engine
      dockerfile: Dockerfile
    env_file:
      - apps/arb-engine/.env
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      nats:
        condition: service_started
      monitor:
        condition: service_healthy
    ports:
      - "18180:18180"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18180/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  pg_data:
